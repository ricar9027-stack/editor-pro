<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Fotos con Monedas y Anuncios</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        /* HEADER CON CONTADOR DE MONEDAS */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 100%;
            margin-bottom: 10px;
        }

        h1 { margin: 0; color: #00bcd4; font-size: 20px; }

        .coins-container {
            display: flex;
            align-items: center;
            background-color: #1e1e1e;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #333;
            gap: 8px;
            font-weight: bold;
        }
        .coin-icon { color: #ffeb3b; font-size: 18px; }
        .btn-add-coins {
            background-color: #ffeb3b;
            color: #121212;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .btn-add-coins:hover { transform: scale(1.1); }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
        }

        /* ÁREA DE PREVISUALIZACIÓN */
        .canvas-area {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e1e1e;
            border-radius: 12px;
            border: 2px dashed #333;
            position: relative;
            height: 45vh;
            min-height: 280px;
            max-height: 400px;
            padding: 5px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        
        #drop-message {
            position: absolute;
            color: #666;
            font-size: 15px;
            text-align: center;
            pointer-events: none;
            padding: 10px;
        }

        /* CONTROLES */
        .controls-container {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 650px) {
            .controls-container { grid-template-columns: 1fr; }
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: #00bcd4;
            margin-bottom: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        label { font-size: 12px; color: #aaa; }
        input[type=range] { width: 100%; cursor: pointer; }

        input[type=text], select {
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input[type=text]:focus, select:focus { border-color: #00bcd4; }

        input[type=color] {
            border: none;
            width: 100%;
            height: 35px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        button, .custom-file-upload {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            text-align: center;
        }
        button:hover, .custom-file-upload:hover { background-color: #444; }
        
        .btn-save { background-color: #00bcd4; color: #121212; font-weight: bold; width: 100%; grid-column: span 2; margin-top: 5px; font-size: 15px;}
        .btn-save:hover { background-color: #00acc1; }
        @media (max-width: 650px) { .btn-save { grid-column: span 1; } }

        input[type="file"] { display: none; }
        .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-buttons button { flex: 1; min-width: 60px; padding: 6px; font-size: 11px; }

        /* PANEL DE DIRECCIÓN D-PAD */
        .d-pad-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: 120px;
            margin: 0 auto;
        }
        .d-pad-btn {
            background-color: #00bcd4;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            padding: 8px;
            border-radius: 6px;
        }
        .d-pad-btn:hover { background-color: #00acc1; }

        .selector-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 5px;
        }
        .selector-box button {
            flex: 1;
            font-weight: bold;
            border: 2px solid transparent;
        }
        .active-selection {
            border-color: #ffeb3b !important;
            background-color: #555 !important;
        }

        /* CONTROLES MÁS Y MENOS */
        .plus-minus-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2a2a2a;
            border-radius: 6px;
            padding: 3px 10px;
            border: 1px solid #444;
        }
        .plus-minus-group button {
            background-color: #444;
            font-size: 14px;
            padding: 4px 12px;
            font-weight: bold;
        }
        .plus-minus-value {
            font-size: 13px;
            font-weight: bold;
            color: #00bcd4;
        }

        /* PANTALLA DE ANUNCIO SIMULADO (OVERLAY) */
        .ads-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            border-radius: 12px;
        }
        .ads-content {
            text-align: center;
            padding: 20px;
        }
        .ads-timer {
            font-size: 48px;
            color: #ffeb3b;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Editor Pro Monetizable</h1>
        <div class="coins-container">
            <span class="coin-icon">🪙</span>
            <span id="coins-display">30</span> Monedas
            <button class="btn-add-coins" title="Adquirir 10 monedas por un anuncio" onclick="triggerRewardAd()">+</button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="canvas-area">
            <p id="drop-message">📁 Selecciona una imagen abajo para empezar.<br>Cada exportación descuenta 10 monedas.</p>
            <canvas id="viewCanvas"></canvas>

            <div id="adsOverlay" class="ads-overlay">
                <div class="ads-content">
                    <h2 style="color: #00bcd4; margin: 0;">Anuncio Patrocinado</h2>
                    <p style="color: #aaa; font-size: 14px;">Tu recompensa se otorgará al finalizar el video...</p>
                    <div id="adsTimer" class="ads-timer">3</div>
                </div>
            </div>
        </div>

        <div class="controls-container">
            
            <div class="panel-section">
                <div class="section-title">Ajustes y Elementos</div>
                
                <div style="display: flex; gap: 8px;">
                    <label for="imageLoader" class="custom-file-upload" style="flex: 1; background-color: #2a2a2a; border: 1px dashed #555;">
                        📁 Foto Base
                    </label>
                    <input type="file" id="imageLoader" accept="image/*"/>

                    <label for="stickerLoader" class="custom-file-upload" style="flex: 1; background-color: #2a2a2a; border: 1px dashed #00bcd4;">
                        ✨ Añadir Sticker
                    </label>
                    <input type="file" id="stickerLoader" accept="image/*"/>
                </div>

                <div class="control-group">
                    <label for="brightness">Brillo: <span id="bright-val">100</span>%</label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>

                <div class="control-group">
                    <label for="contrast">Contraste: <span id="contrast-val">100</span>%</label>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </div>

                <div class="control-group">
                    <label for="saturate">Saturación: <span id="saturate-val">100</span>%</label>
                    <input type="range" id="saturate" min="0" max="200" value="100">
                </div>

                <div class="filter-buttons">
                    <button onclick="applyFilter('grayscale(100%)')">B&N</button>
                    <button onclick="applyFilter('sepia(100%)')">Sepia</button>
                    <button onclick="applyFilter('invert(100%)')">Invertir</button>
                    <button onclick="resetAll()" style="background-color: #552222;">Reset</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">Control de Movimiento y Estilo</div>
                
                <div class="selector-box">
                    <button id="selectTextBtn" class="active-selection" onclick="setTarget('text')">📝 Texto</button>
                    <button id="selectStickerBtn" onclick="setTarget('sticker')">✨ Sticker</button>
                </div>

                <div class="d-pad-container">
                    <div></div>
                    <button class="d-pad-btn" onclick="moveElement('up')">▲</button>
                    <div></div>
                    <button class="d-pad-btn" onclick="moveElement('left')">◀</button>
                    <div style="background-color:#333; border-radius:6px;"></div>
                    <button class="d-pad-btn" onclick="moveElement('right')">▶</button>
                    <div></div>
                    <button class="d-pad-btn" onclick="moveElement('down')">▼</button>
                    <div></div>
                </div>

                <div class="control-group">
                    <label>Tamaño General (DPI):</label>
                    <div class="plus-minus-group">
                        <button onclick="changeSize(-5)">-</button>
                        <span id="dpi-display" class="plus-minus-value">35</span>
                        <button onclick="changeSize(5)">+</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Proporción Horizontal (Ancho / Angosto):</label>
                    <div class="plus-minus-group">
                        <button onclick="changeWidth(-10)">-</button>
                        <span id="width-display" class="plus-minus-value">100%</span>
                        <button onclick="changeWidth(10)">+</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="fontSelect">Fuente (Tipografía):</label>
                    <select id="fontSelect">
                        <option value="Arial" selected>Arial (Clásica)</option>
                        <option value="Impact">Impact (Meme)</option>
                        <option value="Courier New">Courier New (Retro)</option>
                        <option value="Georgia">Georgia (Elegante)</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div class="control-group">
                        <label>Texto:</label>
                        <input type="text" id="textInput" placeholder="Escribe..." value="Texto Ajustable">
                    </div>
                    <div class="control-group">
                        <label>Color:</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                </div>
                
                <input type="range" id="textSize" min="10" max="100" value="35" style="display:none;">

            </div>

            <button id="downloadBtn" class="btn-save">💾 Exportar (-10 Monedas)</button>
        </div>
    </div>

    <script>
        // SISTEMA DE MONEDAS INICIALES (Guardado local para que no se borren al reiniciar)
        let coins = parseInt(localStorage.getItem('user_coins')) || 30;
        document.getElementById('coins-display').innerText = coins;

        const imageLoader = document.getElementById('imageLoader');
        const stickerLoader = document.getElementById('stickerLoader');
        const viewCanvas = document.getElementById('viewCanvas');
        const viewCtx = viewCanvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const dropMessage = document.getElementById('drop-message');

        const brightnessSlider = document.getElementById('brightness');
        const contrastSlider = document.getElementById('contrast');
        const saturateSlider = document.getElementById('saturate');

        const textInput = document.getElementById('textInput');
        const fontSelect = document.getElementById('fontSelect');
        const textSizeSlider = document.getElementById('textSize');
        const textColorInput = document.getElementById('textColor');

        let img = new Image(); 
        let stickerImg = new Image();
        let hasSticker = false;
        let currentCustomFilter = ''; 
        let scaleFactor = 1; 

        let currentTarget = 'text';

        // Propiedades del Texto
        let textXRatio = 0.5;
        let textYRatio = 0.6;
        let textDPI = 35;          
        let textWidthScale = 1.0;  

        // Propiedades del Sticker
        let stickerXRatio = 0.5;
        let stickerYRatio = 0.3;
        let stickerDPI = 30;       
        let stickerWidthScale = 1.0;

        imageLoader.addEventListener('change', handleImage, false);
        stickerLoader.addEventListener('change', handleSticker, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    const maxDisplaySize = 800;
                    let viewWidth = img.width;
                    let viewHeight = img.height;

                    if (img.width > maxDisplaySize || img.height > maxDisplaySize) {
                        if (img.width > img.height) {
                            viewWidth = maxDisplaySize;
                            viewHeight = (img.height / img.width) * maxDisplaySize;
                        } else {
                            viewHeight = maxDisplaySize;
                            viewWidth = (img.width / img.height) * maxDisplaySize;
                        }
                    }

                    scaleFactor = img.width / viewWidth;
                    viewCanvas.width = viewWidth;
                    viewCanvas.height = viewHeight;
                    
                    dropMessage.style.display = 'none';
                    updateEditor(); 
                }
                img.src = event.target.result;
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function handleSticker(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                stickerImg.onload = function() {
                    hasSticker = true;
                    setTarget('sticker');
                    updateEditor();
                }
                stickerImg.src = event.target.result;
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function setTarget(target) {
            currentTarget = target;
            document.getElementById('selectTextBtn').classList.toggle('active-selection', target === 'text');
            document.getElementById('selectStickerBtn').classList.toggle('active-selection', target === 'sticker');
            
            if (target === 'text') {
                document.getElementById('dpi-display').innerText = textDPI;
                document.getElementById('width-display').innerText = Math.round(textWidthScale * 100) + "%";
            } else {
                document.getElementById('dpi-display').innerText = stickerDPI;
                document.getElementById('width-display').innerText = Math.round(stickerWidthScale * 100) + "%";
            }
            updateEditor();
        }

        function moveElement(direction) {
            if (!img.src) return;
            const step = 0.03; 

            if (currentTarget === 'text') {
                if (direction === 'up') textYRatio -= step;
                if (direction === 'down') textYRatio += step;
                if (direction === 'left') textXRatio -= step;
                if (direction === 'right') textXRatio += step;
            } else if (currentTarget === 'sticker' && hasSticker) {
                if (direction === 'up') stickerYRatio -= step;
                if (direction === 'down') stickerYRatio += step;
                if (direction === 'left') stickerXRatio -= step;
                if (direction === 'right') stickerXRatio += step;
            }
            updateEditor();
        }

        function changeSize(amount) {
            if (currentTarget === 'text') {
                textDPI = Math.max(5, Math.min(100, textDPI + amount));
                document.getElementById('dpi-display').innerText = textDPI;
                textSizeSlider.value = textDPI; 
            } else if (currentTarget === 'sticker' && hasSticker) {
                stickerDPI = Math.max(5, Math.min(100, stickerDPI + amount));
                document.getElementById('dpi-display').innerText = stickerDPI;
            }
            updateEditor();
        }

        function changeWidth(amount) {
            let percentageChange = amount / 100;
            if (currentTarget === 'text') {
                textWidthScale = Math.max(0.2, Math.min(3.0, textWidthScale + percentageChange));
                document.getElementById('width-display').innerText = Math.round(textWidthScale * 100) + "%";
            } else if (currentTarget === 'sticker' && hasSticker) {
                stickerWidthScale = Math.max(0.2, Math.min(3.0, stickerWidthScale + percentageChange));
                document.getElementById('width-display').innerText = Math.round(stickerWidthScale * 100) + "%";
            }
            updateEditor();
        }

        function updateEditor() {
            if (!img.src) return; 

            const bright = brightnessSlider.value;
            const contrast = contrastSlider.value;
            const saturate = saturateSlider.value;

            document.getElementById('bright-val').innerText = bright;
            document.getElementById('contrast-val').innerText = contrast;
            document.getElementById('saturate-val').innerText = saturate;

            viewCtx.clearRect(0, 0, viewCanvas.width, viewCanvas.height);

            viewCtx.filter = `brightness(${bright}%) contrast(${contrast}%) saturate(${saturate}%) ${currentCustomFilter}`;
            viewCtx.drawImage(img, 0, 0, viewCanvas.width, viewCanvas.height);
            viewCtx.filter = 'none';

            if (hasSticker) {
                const sWidth = viewCanvas.width * (stickerDPI / 100) * stickerWidthScale;
                const sHeight = (stickerImg.height / stickerImg.width) * (viewCanvas.width * (stickerDPI / 100));
                const sX = (viewCanvas.width * stickerXRatio) - (sWidth / 2);
                const sY = (viewCanvas.height * stickerYRatio) - (sHeight / 2);
                
                viewCtx.drawImage(stickerImg, sX, sY, sWidth, sHeight);

                if (currentTarget === 'sticker') {
                    viewCtx.strokeStyle = '#ffeb3b';
                    viewCtx.lineWidth = 2;
                    viewCtx.strokeRect(sX - 4, sY - 4, sWidth + 8, sHeight + 8);
                }
            }

            drawTextOnCanvas(viewCtx, viewCanvas.width, viewCanvas.height, 1, true);
        }

        function drawTextOnCanvas(context, w, h, scale, drawBorder) {
            const text = textInput.value;
            if (text.trim() !== "") {
                const size = (currentTarget === 'text' ? textDPI : textSizeSlider.value) * scale;
                const font = fontSelect.value;
                const color = textColorInput.value;

                context.save(); 

                const x = w * textXRatio;
                const y = h * textYRatio;

                context.translate(x, y);
                context.scale(textWidthScale, 1.0);

                context.font = `bold ${size}px ${font}`;
                context.fillStyle = color;
                context.textAlign = "center";
                context.textBaseline = "middle";
                context.strokeStyle = "#000000";
                context.lineWidth = size / 7;

                context.strokeText(text, 0, 0);
                context.fillText(text, 0, 0);

                if (drawBorder && currentTarget === 'text') {
                    const textWidth = context.measureText(text).width;
                    context.strokeStyle = '#ffeb3b';
                    context.lineWidth = 2;
                    context.strokeRect(-textWidth / 2 - 6, -size / 2 - 4, textWidth + 12, size + 8);
                }

                context.restore(); 
            }
        }

        [brightnessSlider, contrastSlider, saturateSlider].forEach(slider => {
            slider.addEventListener('input', updateEditor);
        });
        textInput.addEventListener('input', updateEditor);
        fontSelect.addEventListener('change', updateEditor); // Escuchar cambio de fuente
        textColorInput.addEventListener('input', updateEditor);

        function applyFilter(filterString) {
            currentCustomFilter = filterString;
            updateEditor();
        }

        function resetAll() {
            brightnessSlider.value = 100;
            contrastSlider.value = 100;
            saturateSlider.value = 100;
            textInput.value = "Texto Ajustable";
            textDPI = 35;
            textWidthScale = 1.0;
            stickerDPI = 30;
            stickerWidthScale = 1.0;
            currentCustomFilter = '';
            hasSticker = false;
            textXRatio = 0.5;
            textYRatio = 0.6;
            stickerXRatio = 0.5;
            stickerYRatio = 0.3;
            fontSelect.value = "Arial";
            setTarget('text');
        }

        // SIMULADOR DE ANUNCIOS DE RECOMPENSA (3 SEGUNDOS)
        let isAdPlaying = false;
        function triggerRewardAd() {
            if (isAdPlaying) return;
            isAdPlaying = true;

            const overlay = document.getElementById('adsOverlay');
            const timerDisplay = document.getElementById('adsTimer');
            overlay.style.display = 'flex';
            
            let timeLeft = 3;
            timerDisplay.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    overlay.style.display = 'none';
                    
                    // Otorgar recompensa
                    coins += 10;
                    localStorage.setItem('user_coins', coins);
                    document.getElementById('coins-display').innerText = coins;
                    
                    isAdPlaying = false;
                    alert("¡Gracias por ver el anuncio! Has recibido +10 monedas.");
                }
            }, 1000);
        }

        // COMPROBACIÓN DE ECONOMÍA AL EXPORTAR
        downloadBtn.addEventListener('click', function() {
            if (!img.src) {
                alert("Por favor, selecciona una imagen primero.");
                return;
            }

            // Validar si el usuario tiene suficientes monedas
            if (coins < 10) {
                let watchAd = confirm("No tienes suficientes monedas (Costo: 10). ¿Quieres ver un anuncio corto para conseguir 10 monedas gratis?");
                if (watchAd) {
                    triggerRewardAd();
                }
                return;
            }

            // Si tiene monedas, restar 10 y proceder con la exportación
            coins -= 10;
            localStorage.setItem('user_coins', coins);
            document.getElementById('coins-display').innerText = coins;

            const hiddenCanvas = document.createElement('canvas');
            const hiddenCtx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = img.width;
            hiddenCanvas.height = img.height;

            hiddenCtx.filter = `brightness(${brightnessSlider.value}%) contrast(${contrastSlider.value}%) saturate(${saturateSlider.value}%) ${currentCustomFilter}`;
            hiddenCtx.drawImage(img, 0, 0);
            hiddenCtx.filter = 'none';

            if (hasSticker) {
                const sWidth = hiddenCanvas.width * (stickerDPI / 100) * stickerWidthScale;
                const sHeight = (stickerImg.height / stickerImg.width) * (hiddenCanvas.width * (stickerDPI / 100));
                const sX = (hiddenCanvas.width * stickerXRatio) - (sWidth / 2);
                const sY = (hiddenCanvas.height * stickerYRatio) - (sHeight / 2);
                hiddenCtx.drawImage(stickerImg, sX, sY, sWidth, sHeight);
            }

            drawTextOnCanvas(hiddenCtx, hiddenCanvas.width, hiddenCanvas.height, scaleFactor, false);

            const image = hiddenCanvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'foto_monetizada.png';
            link.href = image;
            link.click();
        });
    </script>
</body>
</html>
